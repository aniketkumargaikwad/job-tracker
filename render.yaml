services:
  - type: web
    name: job-tracker
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn app.web_dashboard:app --bind 0.0.0.0:$PORT --workers 2 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DASHBOARD_HOST
        value: "0.0.0.0"
      - key: DASHBOARD_PORT
        value: "10000"
      - key: DASHBOARD_URL
        value: "https://job-tracker-wm9w.onrender.com"
      - key: DATABASE_URL
        sync: false
